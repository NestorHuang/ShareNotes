<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>{{ page.title | default: "ShareNote" | escape }}</title>
    <style>
      :root {
        color-scheme: light dark;
        --page-bg: #f7f9fb;
        --paper-bg: #ffffff;
        --fg: #20242a;
        --soft-fg: #3d4551;
        --muted: #667085;
        --border: #d9e0e8;
        --code-bg: #f3f6f9;
        --code-border: #e3e8ef;
        --link: #0f6cbd;
        --mark: #eef6ff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --page-bg: #0f141b;
          --paper-bg: #151b23;
          --fg: #e7edf4;
          --soft-fg: #c9d4df;
          --muted: #9aa8b7;
          --border: #2d3947;
          --code-bg: #101720;
          --code-border: #2a3543;
          --link: #7ab7ff;
          --mark: #16283b;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page-bg);
        color: var(--fg);
        font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif TC", serif;
        font-size: 18px;
        line-height: 1.78;
        text-rendering: optimizeLegibility;
      }

      main {
        width: min(100% - 32px, 860px);
        margin: 40px auto 72px;
        padding: clamp(28px, 6vw, 72px);
        background: var(--paper-bg);
        border: 1px solid var(--border);
        box-shadow: 0 18px 48px rgb(15 23 42 / 0.08);
      }

      main > *:first-child {
        margin-top: 0;
      }

      main > *:last-child {
        margin-bottom: 0;
      }

      p,
      ul,
      ol,
      blockquote,
      table,
      pre {
        margin: 0 0 1.05em;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        font-weight: 700;
        line-height: 1.28;
        margin: 1.8em 0 0.65em;
      }

      h1 {
        margin-bottom: 1em;
        padding-bottom: 0.55em;
        border-bottom: 1px solid var(--border);
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0;
      }

      h2 {
        font-size: 1.55rem;
      }

      h3 {
        font-size: 1.25rem;
      }

      h4,
      h5,
      h6 {
        font-size: 1.05rem;
      }

      a {
        color: var(--link);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      strong {
        color: var(--fg);
        font-weight: 700;
      }

      hr {
        margin: 2.2em 0;
        border: 0;
        border-top: 1px solid var(--border);
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 1.4em auto;
        border: 1px solid var(--border);
      }

      pre,
      code {
        font-family: "Cascadia Code", Consolas, "Liberation Mono", monospace;
        background: var(--code-bg);
        border-radius: 4px;
      }

      code {
        padding: 0.12em 0.32em;
        border: 1px solid var(--code-border);
        font-size: 0.88em;
      }

      pre {
        overflow-x: auto;
        padding: 18px;
        border: 1px solid var(--code-border);
        line-height: 1.55;
      }

      pre code {
        padding: 0;
        border: 0;
        font-size: 0.9rem;
      }

      blockquote {
        margin-left: 0;
        padding: 0.1em 0 0.1em 1.1em;
        color: var(--muted);
        border-left: 3px solid var(--link);
        font-style: italic;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        font-size: 0.95rem;
      }

      th,
      td {
        padding: 10px 12px;
        border: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        background: var(--code-bg);
        text-align: left;
      }

      mark {
        background: var(--mark);
        color: inherit;
        padding: 0.05em 0.18em;
      }

      li + li {
        margin-top: 0.35em;
      }

      @media (max-width: 640px) {
        body {
          font-size: 17px;
        }

        main {
          width: 100%;
          min-height: 100vh;
          margin: 0;
          padding: 24px 20px 48px;
          border: 0;
          box-shadow: none;
        }
      }

      @media print {
        :root {
          --page-bg: #ffffff;
          --paper-bg: #ffffff;
          --fg: #111111;
          --soft-fg: #333333;
          --muted: #555555;
          --border: #cccccc;
          --code-bg: #f5f5f5;
          --code-border: #dddddd;
          --link: #111111;
        }

        body {
          font-size: 12pt;
          background: #ffffff;
        }

        main {
          width: 100%;
          margin: 0;
          padding: 0;
          border: 0;
          box-shadow: none;
        }

        a {
          color: inherit;
          text-decoration: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
