<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>{{ page.title | default: "ShareNote" | escape }}</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1f2328;
        --muted: #57606a;
        --border: #d0d7de;
        --code-bg: #f6f8fa;
        --link: #0969da;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --fg: #e6edf3;
          --muted: #8b949e;
          --border: #30363d;
          --code-bg: #161b22;
          --link: #58a6ff;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.65;
      }

      main {
        width: min(100% - 32px, 820px);
        margin: 48px auto 72px;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        line-height: 1.25;
        margin: 1.6em 0 0.6em;
      }

      h1 {
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border);
      }

      a {
        color: var(--link);
      }

      img {
        max-width: 100%;
        height: auto;
      }

      pre,
      code {
        font-family: "Cascadia Code", Consolas, monospace;
        background: var(--code-bg);
        border-radius: 6px;
      }

      code {
        padding: 0.15em 0.35em;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
      }

      pre code {
        padding: 0;
      }

      blockquote {
        margin-left: 0;
        padding-left: 1em;
        color: var(--muted);
        border-left: 4px solid var(--border);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px 10px;
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
