<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>{{ page.title | default: "ShareNote" | escape }}</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #d9c59a;
        --paper-bg: #eadbb8;
        --paper-fiber: rgb(112 82 46 / 0.08);
        --fg: #34291f;
        --soft-fg: #514334;
        --muted: #786953;
        --border: #c7ad78;
        --code-bg: #dfcda4;
        --code-border: #c9ad76;
        --link: #7b3f1d;
        --mark: #f5e7a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% 10%, rgb(255 249 229 / 0.28), transparent 34rem),
          linear-gradient(135deg, #c9ae78 0%, var(--page-bg) 46%, #b9945b 100%);
        color: var(--fg);
        font-family: Georgia, "Times New Roman", "Noto Serif TC", "PMingLiU", serif;
        font-size: 18px;
        line-height: 1.86;
        text-rendering: optimizeLegibility;
      }

      main {
        position: relative;
        width: min(100% - 40px, 780px);
        margin: 48px auto 82px;
        padding: clamp(34px, 7vw, 82px);
        background:
          linear-gradient(90deg, transparent 0, rgb(255 255 255 / 0.18) 42%, transparent 100%),
          radial-gradient(circle at 18% 22%, var(--paper-fiber) 0 1px, transparent 1.8px),
          radial-gradient(circle at 70% 65%, rgb(95 67 34 / 0.07) 0 1px, transparent 2px),
          var(--paper-bg);
        background-size: auto, 22px 18px, 28px 24px, auto;
        border: 1px solid var(--border);
        box-shadow:
          0 26px 60px rgb(62 42 19 / 0.24),
          inset 0 0 0 1px rgb(255 255 255 / 0.28);
      }

      main::before {
        content: "";
        position: absolute;
        inset: 12px;
        pointer-events: none;
        border: 1px solid rgb(103 75 38 / 0.12);
      }

      main > *:first-child {
        margin-top: 0;
      }

      main > *:last-child {
        margin-bottom: 0;
      }

      p,
      ul,
      ol,
      blockquote,
      table,
      pre {
        margin: 0 0 1.05em;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--fg);
        font-family: Georgia, "Times New Roman", "Noto Serif TC", "PMingLiU", serif;
        font-weight: 700;
        line-height: 1.28;
        margin: 1.9em 0 0.7em;
      }

      h1 {
        margin-bottom: 1.15em;
        padding-bottom: 0.7em;
        border-bottom: 1px solid var(--border);
        font-size: clamp(2rem, 5vw, 2.85rem);
        letter-spacing: 0;
      }

      h2 {
        font-size: 1.55rem;
      }

      h3 {
        font-size: 1.25rem;
      }

      h4,
      h5,
      h6 {
        font-size: 1.05rem;
      }

      a {
        color: var(--link);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      strong {
        color: var(--fg);
        font-weight: 700;
      }

      hr {
        margin: 2.2em 0;
        border: 0;
        border-top: 1px solid var(--border);
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 1.4em auto;
        border: 1px solid var(--border);
        box-shadow: 0 10px 24px rgb(62 42 19 / 0.14);
      }

      pre,
      code {
        font-family: "Cascadia Code", Consolas, "Liberation Mono", monospace;
        background: var(--code-bg);
        border-radius: 4px;
      }

      code {
        padding: 0.12em 0.32em;
        border: 1px solid var(--code-border);
        font-size: 0.88em;
      }

      pre {
        overflow-x: auto;
        padding: 18px;
        border: 1px solid var(--code-border);
        line-height: 1.55;
      }

      pre code {
        padding: 0;
        border: 0;
        font-size: 0.9rem;
      }

      blockquote {
        margin-left: 0;
        padding: 0.25em 0 0.25em 1.15em;
        color: var(--muted);
        border-left: 3px solid var(--link);
        font-style: italic;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
        font-family: Georgia, "Times New Roman", "Noto Serif TC", "PMingLiU", serif;
        font-size: 0.95rem;
      }

      th,
      td {
        padding: 10px 12px;
        border: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        background: var(--code-bg);
        text-align: left;
      }

      mark {
        background: var(--mark);
        color: inherit;
        padding: 0.05em 0.18em;
      }

      li + li {
        margin-top: 0.35em;
      }

      @media (max-width: 640px) {
        body {
          font-size: 17px;
        }

        main {
          width: 100%;
          min-height: 100vh;
          margin: 0;
          padding: 30px 22px 52px;
          border: 0;
          box-shadow: none;
        }

        main::before {
          display: none;
        }
      }

      @media print {
        :root {
          --page-bg: #ffffff;
          --paper-bg: #ffffff;
          --fg: #111111;
          --soft-fg: #333333;
          --muted: #555555;
          --border: #cccccc;
          --code-bg: #f5f5f5;
          --code-border: #dddddd;
          --link: #111111;
        }

        body {
          font-size: 12pt;
          background: #ffffff;
        }

        main {
          width: 100%;
          margin: 0;
          padding: 0;
          border: 0;
          box-shadow: none;
        }

        a {
          color: inherit;
          text-decoration: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
